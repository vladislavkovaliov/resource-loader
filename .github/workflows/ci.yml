name: Continuos Integration

on:
  push:
    branches:
      - main

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: vladislavkovaliov/wi-github-actions/.github/actions/env-setup@main
        with:
          package-json-path: ./package.json
          package-manager: npm

      - name: Unit test
        run: npm run test
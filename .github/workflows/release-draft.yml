name: 'RC Branch Created'

on:
  workflow_dispatch:

jobs:
  setup-rc:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write


    steps:
      - uses: actions/checkout@v6
      - uses: vladislavkovaliov/wi-github-actions/.github/actions/env-setup@main
        with:
          package-json-path: ./package.json
          package-manager: npm
      - name: Build
        shell: bash
        run: npm run build
      - name: RC branch detected
        run: |
          echo "New RC branch: ${{ github.ref }}"
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Semantic Release
        uses: ./.github/workflows/semantic-release
        with:
          branch: ${{ github.ref_name }}
          npm-token: ${{ secrets.NPM_TOKEN }}
